spring.application.name=rep-analytics-demo-client
spring.main.banner-mode=off
spring.main.web-application-type=none

spring.ai.mcp.client.enabled=true
spring.ai.mcp.client.name=rep-analytics-demo-client
spring.ai.mcp.client.version=0.0.1
spring.ai.mcp.client.type=SYNC
spring.ai.mcp.client.request-timeout=30s
spring.ai.mcp.client.stdio.servers-configuration=classpath:mcp-servers.json

spring.ai.openai.api-key=${LLM_API_KEY:demo-key}
spring.ai.openai.base-url=${LLM_BASE_URL:https://api.openai.com}
spring.ai.openai.chat.options.model=${LLM_MODEL:gpt-4o-mini}

logging.level.root=OFF
