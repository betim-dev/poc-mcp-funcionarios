spring.application.name=rep-analytics-mcp-server
spring.main.banner-mode=off
spring.main.web-application-type=none

spring.ai.mcp.server.name=rep-analytics-mcp-server
spring.ai.mcp.server.version=0.0.1
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.stdio=true
spring.ai.mcp.server.instructions=MCP server for employee and hour-bank analytics with friendly business answers for LLM clients.

rep.analytics.default-year=2026
rep.analytics.employee-data=classpath:mock-api/employees.json
rep.analytics.hour-bank-data=classpath:mock-api/hour-banks.json

logging.level.root=OFF
